services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pixelvault:${POSTGRES_PASSWORD}@postgres:5432/pixelvault
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - STORAGE_PATH=/data/uploads
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-png,jpg,jpeg,gif,webp}
      - SITE_NAME=${SITE_NAME:-PixelVault}
      - SITE_URL=${SITE_URL:-http://${INSTANCE_DOMAIN}}
      - THUMB_SIZES=${THUMB_SIZES:-150,320,640}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pixelvault
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=pixelvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pixelvault" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  uploads:
