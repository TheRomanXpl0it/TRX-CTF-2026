<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notes</title>
    <style>
      body { font-family: sans-serif; margin: 2rem auto; max-width: 40rem; padding: 0 1rem; }
      form { margin-bottom: 1rem; }
      input, textarea, button { width: 100%; box-sizing: border-box; padding: .6rem; margin-top: .4rem; }
      ul { padding-left: 1.25rem; }
      li { margin-bottom: .5rem; word-break: break-all; }
    </style>
  </head>
  <body>
    <h1>Notes</h1>

    <form id="search-form" action="/" method="get">
      <label for="q">Search</label>
      <input id="q" name="q" value="{{ q }}" autocomplete="off">
      <button type="submit">Filter</button>
    </form>

    <form id="note-form">
      <label for="content">New note</label>
      <textarea id="content" name="content" rows="4" required></textarea>
      <button type="submit">Add note</button>
    </form>

    <ul>
      {% for note in notes %}
      <li>{{ note.content }}</li>
      {% else %}
      <li>No notes found.</li>
      {% endfor %}
    </ul>

    <script>
      document.getElementById("note-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = document.getElementById("content").value;
        const response = await fetch("/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });
        if (response.ok) {
          location.reload();
          return;
        }
        alert("request failed");
      });
    </script>
  </body>
</html>
